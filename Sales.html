
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NYONDO Sales Desk</title>
    <style>
        /* Internal Styling */
        body {
            background-color: skyblue;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        .sales-container {
            background: #ffffff;
            width: 100%;
            max-width: 650px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 3px solid skyblue;
            padding-bottom: 10px;
        }

        .form-section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #34495e;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .row div {
            flex: 1;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="sales-container">
        <h1>Sales Entry 🧾</h1>
        
        <form id="salesForm">
            <div class="form-section">
                <label for="sale-date">Date of Sale:</label>
                <input type="date" id="sale-date" name="saleDate" required>
            </div>

            <div class="form-section">
                <label for="product">Select Item Sold:</label>
                <select id="product" required>
                    <option value="">-- Choose Item from Inventory --</option>
                    <optgroup label="Cement">
                        <option value="cem-ii">Cement CEM II N</option>
                        <option value="cem-iii">Cement CEM III N</option>
                    </optgroup>
                    <optgroup label="Iron Bars">
                        <option value="bar-10">Iron Bar (10mm)</option>
                        <option value="bar-12">Iron Bar (12mm)</option>
                        <option value="bar-16">Iron Bar (16mm)</option>
                    </optgroup>
                    <optgroup label="Nails (5kg Packs)">
                        <option value="nail-1">Nails (1 inch)</option>
                        <option value="nail-3">Nails (3 inch)</option>
                        <option value="nail-4">Nails (4 inch)</option>
                        <option value="nail-5">Nails (5 inch)</option>
                        <option value="nail-roofing">Roofing Nails</option>
                    </optgroup>
                    <optgroup label="Fencing & Mesh">
                        <option value="wire-mesh">Wire Mesh</option>
                        <option value="barbed-high">Barbed Wire (High Tensile)</option>
                        <option value="barbed-low">Barbed Wire (Low Tensile)</option>
                    </optgroup>
                    <optgroup label="Equipment & Sheets">
                        <option value="wheelbarrow">Wheelbarrow</option>
                        <option value="iron-sheets">Iron Sheets (Assorted)</option>
                    </optgroup>
                </select>
            </div>

            <div class="row">
                <div>
                    <label for="color">Color (Sheets):</label>
                    <input type="text" id="color" placeholder="e.g. Red">
                </div>
                <div>
                    <label for="gauge">Gauge (Sheets):</label>
                    <input type="number" id="gauge" name="gauge" placeholder="e.g. 28">
                </div>
            </div>

            <div class="row">
                <div>
                    <label for="quantity">Quantity Sold:</label>
                    <input type="number" id="quantity" min="1" required>
                </div>
                <div>
                    <label for="unit-price">Unit Price (UGX):</label>
                    <input type="number" id="unit-price" required>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

            <div class="form-section">
                <label for="customer-type">Customer Category:</label>
                <select id="customer-type" required>
                    <option value="individual">Individual Buyer</option>
                    <option value="retailer">Retailer</option>
                    <option value="wholesaler">Wholesaler</option>
                </select>
            </div>

            <div class="form-section">
                <label for="customer">Customer Name:</label>
                <input type="text" id="customer" name="customerName" placeholder="Enter Full Name" required>
            </div>

            <div class="form-section">
                <label for="payment-mode">Payment Mode:</label>
                <select id="payment-mode" required>
                    <option value="cash">Full Cash</option>
                    <option value="mobile-money">Mobile Money</option>
                    <option value="bank-transfer">Bank Transfer</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">Process Sale</button>
            <a href="Receipt.html">Receipts</a>
            <a href="sales_table.html">Sales Table</a>
        </form>
    </div>

</body>
</html>
