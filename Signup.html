<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONDO Hardware | Staff Enrollment</title>
    <style>
        /* Base Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Beautiful hardware background with Sky Blue tint */
            background: linear-gradient(rgba(0, 154, 217, 0.5), rgba(0, 154, 217, 0.7)), 
                        url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?q=80&w=1470&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Glassmorphism Signup Card */
        .signup-card {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 550px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Hardware Logo Badge */
        .logo-circle {
            width: 70px;
            height: 70px;
            background: #87CEEB;
            margin: 0 auto 15px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 35px;
            box-shadow: 0 5px 15px rgba(135, 206, 235, 0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h2 {
            color: #1a2a3a;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header p {
            color: #5d6d7e;
            font-size: 14px;
            margin-top: 5px;
        }

        /* Form Layout */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 13px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #d5dbdb;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            border-color: #87CEEB;
            background-color: #f7fdff;
        }

        /* Role Selection - Highlighted */
        select {
            background-color: #f4faff;
            font-weight: bold;
            color: #1976D2;
            cursor: pointer;
        }

        /* Button Styling */
        .submit-btn {
            background: #87CEEB;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(135, 206, 235, 0.4);
        }

        .submit-btn:hover {
            background: #00BFFF;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0, 191, 255, 0.4);
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #7f8c8d;
        }

        .footer-text a {
            color: #1976D2;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="signup-card">
        <div class="logo-circle">⚒</div>
        
        <div class="header">
            <h2>Staff Enrollment</h2>
            <p>NYONDO General Hardware LTD - Nansana</p>
        </div>

        <form>
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Assigned System Role</label>
                    <select name="user-role" required>
                        <option value="" disabled selected>Choose your role...</option>
                        <option value="administrator">Administrator (Full Access)</option>
                        <option value="sales-attendant">Sales Attendant (Retail/Wholesale)</option>
                        <option value="stock-manager">Stock Manager (Inventory/Suppliers)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Full Name (As per National ID)</label>
                    <input type="text" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label>NIN Number</label>
                    <input type="text" placeholder="CM00000000000" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="0700 000 000" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="staff@nyondo.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <div class="form-group full-width">
                    <button type="submit" class="submit-btn">Register to System</button>
                </div>
            </div>
        </form>

        <div class="footer-text">
            Already have an account? <a href="Login.html">Log In</a><br>
             <a href="home.html" class="back-home">← Back to Home</a>
        </div>
    </div>

</body>
</html>
