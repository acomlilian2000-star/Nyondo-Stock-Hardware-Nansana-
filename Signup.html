<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONDO ERP - Staff Activation</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --nyondo-blue: #0ea5e9;
            --nyondo-dark: #0369a1;
            --white: #ffffff;
            --overlay: rgba(135, 206, 235, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { 
            background: linear-gradient(var(--overlay), var(--overlay)), 
                        url('https://images.unsplash.com/photo-1516880711640-ef7db81be3e1?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }

        .activation-card {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h2 {
            color: var(--nyondo-dark);
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header p {
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 5px;
            font-weight: 500;
        }

        .instruction-box {
            background: #f0f9ff;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid var(--nyondo-blue);
            font-size: 0.8rem;
            color: #0369a1;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .field-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--nyondo-dark);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #f1f5f9;
            border-radius: 10px;
            font-size: 0.95rem;
            background-color: #f8fafc;
            transition: all 0.3s ease;
            appearance: none; /* For cleaner select look */
        }

        /* Custom arrow for select dropdown */
        .select-wrapper {
            position: relative;
        }
        
        .select-wrapper::after {
            content: "\f107";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--nyondo-dark);
            pointer-events: none;
        }

        input:focus, select:focus {
            border-color: var(--nyondo-blue);
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15);
        }

        .verify-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #94a3b8;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .verify-divider::before, .verify-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .verify-divider:not(:empty)::before { margin-right: .5em; }
        .verify-divider:not(:empty)::after { margin-left: .5em; }

        .submit-btn {
            background: var(--nyondo-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: var(--nyondo-dark);
        }

        .footer-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: #64748b;
        }

        .footer-link a {
            color: var(--nyondo-blue);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="activation-card">
        <div class="header">
            <h2>Account Activation</h2>
            <p>NYONDO STOCK General Hardware LTD Staff Portal</p>
        </div>

        <div class="instruction-box">
            <i class="fa-solid fa-shield-halved"></i> 
            Verify your details to set up your secure access.
        </div>

        <form id="staffActivationForm">
            <div class="field-group">
                <label>System Username</label>
                <input type="text" placeholder="e.g. j.doe_nyondo" required>
            </div>

            <div class="field-group">
                <label>Assigned System Role</label>
                <div class="select-wrapper">
                    <select id="userRole" required>
                        <option value="" disabled selected>Select your role...</option>
                        <option value="administrator">Administrator</option>
                        <option value="stock-manager">Stock Manager</option>
                        <option value="sales-attendant">Sales Attendant</option>
                    </select>
                </div>
            </div>

            <div class="field-group">
                <label>National ID Number (NIN)</label>
                <input type="text" placeholder="CM00000000XXXX" required maxlength="14" style="text-transform: uppercase;">
            </div>

            <div class="verify-divider">Security Setup</div>

            <div class="field-group">
                <label>Temporary Password</label>
                <input type="password" placeholder="Given by Admin" required>
            </div>

            <div class="field-group">
                <label>New Permanent Password</label>
                <input type="password" id="newPass" placeholder="Create a strong password" required minlength="8">
            </div>

            <div class="field-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPass" placeholder="Repeat permanent password" required>
            </div>

            <button type="submit" class="submit-btn">
                <i class="fa-solid fa-circle-check"></i> Complete Activation
            </button>
        </form>

        <div class="footer-link">
            Need help? Contact the <a href="#">Nansana Admin Desk</a>
        </div>
    </div>

    <script>
        document.getElementById('staffActivationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const p1 = document.getElementById('newPass').value;
            const p2 = document.getElementById('confirmPass').value;
            const role = document.getElementById('userRole').value;

            if (p1 !== p2) {
                alert("The permanent passwords do not match. Please re-enter.");
                return;
            }

            alert(`Profile Verified for [${role.replace('-', ' ').toUpperCase()}]. Your credentials are saved. Redirecting to Login...`);
            // Here you would typically use window.location.href to go to the login page.
        });
    </script>

</body>
</html>
