
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Registration - NYONDO General Hardware LTD</title>
    <style>
        body {
            background-color: skyblue;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .form-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            color: #333;
            text-align: center;
            margin-top: 0;
            border-bottom: 2px solid skyblue;
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        input[type="text"], 
        input[type="tel"], 
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #0078d4;
            box-shadow: 0 0 5px rgba(0, 120, 212, 0.3);
        }

        .checkbox-container {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #eee;
        }

        .checkbox-container input {
            margin-top: 4px;
        }

        .checkbox-label {
            font-size: 0.85rem;
            color: #666;
            line-height: 1.4;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Supplier Registration</h2>
    
    <form action="#" method="post">
        
        <div class="form-group">
            <label class="section-label">Company Name</label>
            <input type="text" name="company_name" placeholder="Enter legal business name" required>
        </div>

        <div class="form-group">
            <label class="section-label">Contact Person Name</label>
            <input type="text" name="contact_person" placeholder="Full name as per National ID" required>
        </div>

        <div class="form-group">
            <label class="section-label">Phone Number</label>
            <input type="tel" name="phone_number" placeholder="Primary contact number" required>
        </div>

        <div class="form-group">
            <label class="section-label">NIN Number</label>
            <input type="text" name="nin_number" placeholder="National Identification Number" required>
        </div>

        <div class="form-group">
            <label class="section-label">Preferred Payment Method</label>
            <select name="payment_method" required>
                <option value="" disabled selected>Select a payment method</option>
                <option value="Bank Transfer">Bank Transfer (EFT/RTGS)</option>
                <option value="Mobile Money">Mobile Money</option>
                <option value="Cheque">Cheque</option>
                <option value="Cash">Cash on Delivery</option>
            </select>
        </div>

        <div class="form-group">
            <div class="checkbox-container">
                <input type="checkbox" id="agreement" name="agreement" required>
                <label for="agreement" class="checkbox-label">
                    I hereby certify that the information provided is accurate and I agree to the supply and credit terms governing NYONDO General Hardware LTD.
                </label>
            </div>
        </div>

        <button type="submit">Submit Registration</button>

    </form>
</div>

</body>
</html>
