<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONDO ERP | Secure Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nyondo-blue: #0ea5e9;
            --nyondo-dark: #0369a1;
            --white: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --bg-input: #f8fafc;
            --border-color: #f1f5f9;
            --overlay: rgba(135, 206, 235, 0.85); /* Matched Sky Blue Overlay */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { 
            /* MATCHED BACKGROUND IDENTITY */
            background: linear-gradient(var(--overlay), var(--overlay)), 
                        url('https://images.unsplash.com/photo-1516880711640-ef7db81be3e1?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }

        /* Glassmorphism Effect */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 420px;
            padding: 45px 35px;
            border-radius: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.6);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .logo-section {
            margin-bottom: 30px;
        }

        .logo-icon-box {
            width: 75px;
            height: 75px;
            background: var(--nyondo-dark);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 2rem;
            box-shadow: 0 10px 15px -3px rgba(3, 105, 161, 0.3);
        }

        .logo-section h2 {
            color: var(--nyondo-dark);
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }

        .logo-section p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 4px;
            font-weight: 500;
        }

        /* Form Structure */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--nyondo-dark);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        /* Icons inside inputs */
        .input-wrapper i.field-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1rem;
            pointer-events: none;
        }

        input, select {
            width: 100%;
            padding: 15px 15px 15px 48px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 0.95rem;
            background-color: var(--bg-input);
            transition: all 0.3s ease;
            color: var(--text-dark);
        }

        select {
            cursor: pointer;
            appearance: none; /* Hide default arrow */
        }

        /* Custom Dropdown Arrow */
        .input-wrapper::after {
            content: "\f107"; /* Font Awesome Chevron Down */
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            pointer-events: none;
            font-size: 1rem;
        }
        /* Hide arrow for standard inputs */
        .input-wrapper:not(.select-group)::after { display: none; }

        input:focus, select:focus {
            border-color: var(--nyondo-blue);
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        }

        /* Submit Button */
        .login-btn {
            background: var(--nyondo-blue);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .login-btn:hover {
            background: var(--nyondo-dark);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(3, 105, 161, 0.3);
        }

        /* Footer links */
        .footer-links {
            margin-top: 30px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-links a {
            color: var(--nyondo-blue);
            text-decoration: none;
            font-weight: 700;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .branch-tag {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .login-card { padding: 35px 25px; }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-section">
            <div class="logo-icon-box">
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </div>
            <h2>NYONDO ERP</h2>
            <p>Secure Staff Access Terminal</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>System Access Level</label>
                <div class="input-wrapper select-group">
                    <i class="fa-solid fa-user-tag field-icon"></i>
                    <select id="userRole" required>
                        <option value="" disabled selected>Identify your role...</option>
                        <option value="administrator">Administrator</option>
                        <option value="stock-manager">Stock Manager</option>
                        <option value="sales-attendant">Sales Attendant</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Staff ID / Username</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-id-card field-icon"></i>
                    <input type="text" placeholder="e.g. j.doe_nyondo" required>
                </div>
            </div>

            <div class="form-group">
                <label>Security Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock field-icon"></i>
                    <input type="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="login-btn">
                <i class="fa-solid fa-shield-check"></i> Authenticate & Login
            </button>
        </form>

        <div class="footer-links">
            <p>New staff member? <a href="Signup.html">Activate here</a></p>
            <p style="margin-top: 12px;"><a href="Login.html">Trouble signing in?</a></p>
        </div>

        <div class="branch-tag">
            <i class="fa-solid fa-location-dot"></i> Nansana Branch • Kampala, Uganda
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const role = document.getElementById('userRole').value;
            
            // In a production environment, you would validate credentials here.
            alert(`Authenticating as [${role.replace('-', ' ').toUpperCase()}]... Redirecting...`);
            
            // Redirect based on role (future development)
            // if(role === 'administrator') window.location.href = 'admin_dashboard.html';
            window.location.href = 'dashboard.html'; 
        });
    </script>

</body>
</html>
