<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONDO ERP - Staff Registration</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --nyondo-blue: #0ea5e9;
            --nyondo-dark: #0369a1;
            --white: #ffffff;
            --overlay: rgba(135, 206, 235, 0.85); /* Sky Blue Overlay */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { 
            /* Background Image with Sky Blue Gradient Overlay */
            background: linear-gradient(var(--overlay), var(--overlay)), 
                        url('https://images.unsplash.com/photo-1516880711640-ef7db81be3e1?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }

        /* Professional Form Container */
        .reg-card {
            background: var(--white);
            width: 100%;
            max-width: 650px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .reg-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .reg-header h2 {
            color: var(--nyondo-dark);
            font-size: 1.8rem;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .reg-header p {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 5px;
            font-weight: 500;
        }

        /* Form Grid Layout */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .field-group {
            margin-bottom: 15px;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--nyondo-dark);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #f1f5f9;
            border-radius: 10px;
            font-size: 0.95rem;
            background-color: #f8fafc;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--nyondo-blue);
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15);
        }

        .helper-text {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 4px;
        }

        /* Submit Button */
        .submit-btn {
            grid-column: span 2;
            background: var(--nyondo-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .submit-btn:hover {
            background: var(--nyondo-dark);
        }

        /* Responsive */
        @media (max-width: 550px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="reg-card">
        <div class="reg-header">
            <h2>NYONDO Staff Onboarding</h2>
            <p>Admin Control Panel — Nansana Branch</p>
        </div>

        <form id="nyondoRegForm">
            <div class="form-grid">
                <div class="field-group full-width">
                    <label>Full Legal Name</label>
                    <input type="text" placeholder="As shown on National ID" required>
                </div>

                <div class="field-group full-width">
                    <label>National Identification Number (NIN)</label>
                    <input type="text" placeholder="CM00000000XXXX" required maxlength="14" style="text-transform: uppercase;">
                </div>

                <div class="field-group">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="07XX XXXXXX" required>
                </div>
                <div class="field-group">
                    <label>Work Email</label>
                    <input type="email" placeholder="name@nyondo.com" required>
                </div>

                <div class="field-group">
                    <label>System Username</label>
                    <input type="text" placeholder="e.g. j.doe_nyondo" required>
                </div>
                <div class="field-group">
                    <label>Assigned Role</label>
                    <select required>
                        <option value="">Select Role...</option>
                        <option value="admin">Administrator</option>
                        <option value="stock">Stock Manager</option>
                        <option value="sales">Sales Attendant</option>
                    </select>
                </div>

                <div class="field-group">
                    <label>Temporary Password</label>
                    <input type="password" placeholder="••••••••" required>
                    <p class="helper-text">User must change this on first login.</p>
                </div>
                <div class="field-group">
                    <label>Account Status</label>
                    <select>
                        <option value="active">Active (Immediate Access)</option>
                        <option value="inactive">Inactive (On Hold)</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fa-solid fa-user-shield"></i> Create Official Account
                </button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('nyondoRegForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Staff record (NIN verified) successfully committed to NYONDO Central Database.');
        });
    </script>

</body>
</html>
