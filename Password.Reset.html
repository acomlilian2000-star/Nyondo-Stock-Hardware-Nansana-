<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONDO Hardware | Reset Password</title>
    <style>
        /* Base Setup - Matches Login Page */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* USING THE SAME BACKGROUND IMAGE AND OVERLAY */
            background: linear-gradient(rgba(0, 154, 217, 0.5), rgba(0, 154, 217, 0.7)), 
                        url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?q=80&w=1470&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Glassmorphism Card */
        .reset-card {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        /* Logo Badge - Matches Login Page */
        .logo-box {
            width: 70px;
            height: 70px;
            background: #87CEEB;
            margin: 0 auto 20px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 35px;
            box-shadow: 0 5px 15px rgba(135, 206, 235, 0.4);
        }

        .header h2 {
            color: #1a2a3a;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .header p {
            color: #5d6d7e;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Form Styling */
        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 13px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #d5dbdb;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            transition: all 0.3s ease;
            background-color: white;
        }

        input:focus {
            border-color: #87CEEB;
            background-color: #f7fdff;
        }

        /* Reset Button */
        .reset-btn {
            background: #87CEEB;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(135, 206, 235, 0.4);
        }

        .reset-btn:hover {
            background: #00BFFF;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0, 191, 255, 0.4);
        }

        /* Footer Links */
        .footer-links {
            margin-top: 25px;
            font-size: 13px;
            color: #7f8c8d;
        }

        .footer-links a {
            color: #1976D2;
            text-decoration: none;
            font-weight: bold;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* Info Alert */
        .info-box {
            background: #e3f2fd;
            color: #1976D2;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #1976D2;
        }
    </style>
</head>
<body>

    <div class="reset-card">
        <div class="logo-box">🔑</div>
        
        <div class="header">
            <h2>Reset Password</h2>
            <p>Enter your registered email address to receive recovery instructions.</p>
        </div>

        <div class="info-box">
            A secure link will be sent to your staff inbox.
        </div>

        <form action="#">
            <div class="form-group">
                <label for="email">Staff Email / ID</label>
                <input type="text" id="email" placeholder="e.g. staff@nyondo.com" required>
            </div>

            <button type="submit" class="reset-btn">Send Recovery Link</button>
        </form>

        <div class="footer-links">
            Remember your password? <a href="Login.html">Back to Login</a>
        </div>
    </div>

</body>
</html>
