<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONDO ERP | Add New Stock</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nyondo-blue: #0ea5e9;
            --nyondo-dark: #0369a1;
            --bg-gray: #f1f5f9;
            --white: #ffffff;
            --text-dark: #0f172a;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: linear-gradient(rgba(135, 206, 235, 0.8), rgba(3, 105, 161, 0.8)), 
                        url('https://images.unsplash.com/photo-1516880711640-ef7db81be3e1?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .form-container {
            background: var(--white);
            width: 100%;
            max-width: 850px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .form-header {
            background: var(--nyondo-dark);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-header h1 { font-size: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }

        form { padding: 40px; }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .section-title {
            grid-column: span 2;
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--nyondo-dark);
            text-transform: uppercase;
            border-bottom: 2px solid var(--nyondo-blue);
            padding-bottom: 8px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        
        label { font-size: 0.85rem; font-weight: 600; color: #475569; }

        input, select {
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            background: #f8fafc;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--nyondo-blue);
            background: white;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        }

        /* Highlighting the selection fields */
        .select-highlight {
            border: 2px solid #bae6fd;
            background-color: #f0f9ff;
        }

        .read-only { background-color: #f1f5f9; cursor: not-allowed; font-weight: 700; color: #475569; }
        .debt-text { color: #ef4444; }

        .btn-row {
            grid-column: span 2;
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .submit-btn {
            background: var(--nyondo-blue);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            flex: 2;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .submit-btn:hover { background: var(--nyondo-dark); transform: translateY(-2px); }

        .cancel-btn {
            background: #f1f5f9;
            color: #64748b;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            flex: 1;
            text-align: center;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .section-title, .btn-row { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <div>
                <h1>📦 Stock Entry Terminal</h1>
                <p style="font-size: 0.8rem; opacity: 0.9;">System Log: Registered Inventory Only</p>
            </div>
            <i class="fa-solid fa-boxes-stacked fa-2x"></i>
        </div>

        <form id="stockForm">
            <div class="form-grid">
                <div class="section-title"><i class="fa-solid fa-magnifying-glass"></i> Inventory Selection</div>
                
                <div class="input-group">
                    <label>Select Item</label>
                    <select class="select-highlight" id="itemName" required>
                        <option value="" disabled selected>-- Choose Registered Item --</option>
                        <optgroup label="Cement">
                            <option>Hima Cement (Bamburi)</option>
                            <option>Simba Cement</option>
                            <option>Tororo Cement (Power Plus)</option>
                        </optgroup>
                        <optgroup label="Iron Products">
                            <option>Iron Bars 12mm</option>
                            <option>Iron Bars 10mm</option>
                            <option>Iron Sheets G30 (Blue)</option>
                        </optgroup>
                        <optgroup label="Other Hardware">
                            <option>Roofing Nails (5kg)</option>
                            <option>PVC Pipes 4-inch</option>
                            <option>Falcon Gold Calmax (Foliar)</option>
                        </optgroup>
                    </select>
                </div>

                <div class="input-group">
                    <label>Category</label>
                    <input type="text" id="autoCategory" class="read-only" placeholder="Auto-fills on selection" readonly>
                </div>

                <div class="input-group">
                    <label>Unit of Measure</label>
                    <select required>
                        <option>Bags</option>
                        <option>Pieces (Pcs)</option>
                        <option>Packs</option>
                        <option>Kilograms (Kg)</option>
                        <option>Rolls</option>
                        <option>Liters (L)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Quantity Added</label>
                    <input type="number" id="qty" placeholder="0" required>
                </div>

                <div class="section-title"><i class="fa-solid fa-tags"></i> Pricing (UGX)</div>
                
                <div class="input-group">
                    <label>Unit Cost (Buying Price)</label>
                    <input type="number" id="unitCost" placeholder="Price per unit" required>
                </div>

                <div class="input-group">
                    <label>Selling Price</label>
                    <input type="number" placeholder="Retail price" required>
                </div>

                <div class="section-title"><i class="fa-solid fa-handshake"></i> Verified Suppliers</div>
                
                <div class="input-group">
                    <label>Select Supplier</label>
                    <select class="select-highlight" id="supplierName" required>
                        <option value="" disabled selected>-- Choose Supplier --</option>
                        <option>Roofings Limited</option>
                        <option>Hima Cement Ltd</option>
                        <option>Uganda Baati</option>
                        <option>Simba Cement Factory</option>
                        <option>Plastic World Uganda</option>
                        <option>Imported (Direct)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Delivery Date</label>
                    <input type="date" required value="2026-04-27">
                </div>

                <div class="section-title"><i class="fa-solid fa-wallet"></i> Payment Transaction</div>
                
                <div class="input-group">
                    <label>Payment Type</label>
                    <select id="payType" required>
                        <option value="Cash">Cash (Full Payment)</option>
                        <option value="Credit">Credit (Debt Agreement)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Amount Paid (UGX)</label>
                    <input type="number" id="amtPaid" placeholder="Enter amount paid" required>
                </div>

                <div class="input-group" style="grid-column: span 2;">
                    <label>Transaction Summary (Balance/Debt)</label>
                    <input type="text" id="balance" class="read-only" value="UGX 0" readonly>
                </div>

                <div class="btn-row">
                    <button type="submit" class="submit-btn">Authorize Stock Entry</button>
                    <a href="stockDashboard.html" class="cancel-btn">Back to Yard</a>
                </div>
            </div>
        </form>
    </div>

    <script>
        // Auto-category Logic
        const itemSelect = document.getElementById('itemName');
        const categoryInput = document.getElementById('autoCategory');

        itemSelect.addEventListener('change', function() {
            const selectedText = this.value;
            if (selectedText.includes('Cement')) categoryInput.value = "Masonry / Cement";
            else if (selectedText.includes('Iron')) categoryInput.value = "Steel / Metal";
            else if (selectedText.includes('Nails')) categoryInput.value = "Fasteners";
            else if (selectedText.includes('Calmax')) categoryInput.value = "Agriculture / Foliar";
            else categoryInput.value = "General Hardware";
        });

        // Calculation Logic
        const qtyInput = document.getElementById('qty');
        const costInput = document.getElementById('unitCost');
        const paidInput = document.getElementById('amtPaid');
        const balanceOutput = document.getElementById('balance');

        function calculateBalance() {
            const qty = parseFloat(qtyInput.value) || 0;
            const cost = parseFloat(costInput.value) || 0;
            const paid = parseFloat(paidInput.value) || 0;
            
            const totalCost = qty * cost;
            const balance = totalCost - paid;

            if (balance > 0) {
                balanceOutput.value = "DEBT OWED: UGX " + balance.toLocaleString();
                balanceOutput.classList.add('debt-text');
            } else if (balance < 0) {
                balanceOutput.value = "OVERPAID: UGX " + Math.abs(balance).toLocaleString();
                balanceOutput.classList.remove('debt-text');
            } else {
                balanceOutput.value = "TRANSACTION CLEARED";
                balanceOutput.classList.remove('debt-text');
            }
        }

        [qtyInput, costInput, paidInput].forEach(input => {
            input.addEventListener('input', calculateBalance);
        });

        document.getElementById('stockForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Success: Inventory record authorized and updated.");
            window.location.href = "stockDashboard.html";
        });
    </script>

</body>
</html>
