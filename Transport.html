
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NYONDO Transport Management</title>
    <style>
        /* Internal Styling Block */
        body {
            background-color: skyblue;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #2c3e50;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 450px;
            border: 1px solid #ccc;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        fieldset {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        input {
            width: 95%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .policy-box {
            background-color: #f9f9f9;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9em;
            color: #555;
            border-left: 5px solid #2c3e50;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>

    <h1>NYONDO Transport & Logistics 🚛</h1>

    <div class="card">
        <h2>Delivery Details</h2>
        <form>
            <fieldset>
                <legend><strong>Customer Information</strong></legend>
                <label for="cust-name">Customer Name:</label>
                <input type="text" id="cust-name" required>
                
                <br><br>
                
                <label for="location">Delivery Destination:</label>
                <input type="text" id="location" placeholder="e.g., Nansana West" required>
            </fieldset>

            <fieldset>
                <legend><strong>Order Eligibility</strong></legend>
                <label for="order-value">Total Order Value (UGX):</label>
                <input type="number" id="order-value" min="0" required>

                <br><br>

                <label for="distance">Distance from Nansana (km):</label>
                <input type="number" id="distance" min="0" required>
            </fieldset>

            <div class="policy-box">
                <strong>Policy:</strong> 
                Free delivery if distance ≤ 10km AND order ≥ 500,000 shs. 
                Otherwise, extra 30,000 shs.
            </div><br>

            <button type="submit" class="btn">Calculate & Record Delivery</button>
        </form>
    </div>

</body>
</html>
